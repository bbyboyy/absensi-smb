<!DOCTYPE html>
<html>
<head>
    <title>Admin Panel</title>
    <!-- <link rel="stylesheet" href="style.css"> -->

    <!-- PWA -->
    <link rel="manifest" href="manifest.json">

    <!-- iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Absensi QR">
    <meta name="theme-color" content="#0d6efd">

    <!-- Responsive -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Styling -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen p-6">

    <div class="max-w-5xl mx-auto space-y-8">
        <h2 class="text-3xl font-bold">
            🔐 Admin Panel
        </h2>

        <!-- CARD TAMBAH USER -->
        <div class="bg-white p-6 rounded-2xl shadow-md">
            <h3 class="text-xl font-semibold mb-4">Tambah User</h3>

            <div class="grid md:grid-cols-2 gap-4">

                <input type="email" id="newEmail" placeholder="Email"
                    class="px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">

                <input type="password" id="newPassword" placeholder="Password"
                    class="px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">

                <input type="text" id="newName" placeholder="Nama"
                    class="px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">

                <select id="newRole"
                    class="px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                    <option value="user">User</option>
                    <option value="admin">Admin</option>
                </select>

            </div>

            <button id="btnAddUser"
                class="mt-4 w-full bg-green-600 text-white px-6 py-2 rounded-lg hover:bg-green-700 transition">
                Tambah User
            </button>
        </div>

        <!-- CARD USER LIST -->
        <div class="bg-white p-6 rounded-2xl shadow-md">
            <h3 class="text-xl font-semibold mb-4">Daftar User</h3>
            <div id="userList" class="space-y-2"></div>
        </div>

        <!-- CARD ABSENSI -->
        <!-- <div class="bg-white p-6 rounded-2xl shadow-md">
            <h3 class="text-xl font-semibold mb-4">Data Absensi</h3>
            <div id="attendanceList" class="space-y-2"></div>
        </div> -->

        <!-- TABLE ATTENDANCE -->
         <div class="overflow-x-auto">
            <table class="border-collapse min-w-full border border-gray-300 text-sm">
                <thead id="rekapHead"></thead>
                <tbody id="rekapBody"></tbody>
            </table>
        </div>

        <!-- CARD INSERT ATTENDANCE -->
        <div class="bg-white p-6 rounded-2xl shadow-md">
            <h3 class="text-xl font-semibold mb-4">Add Attendance</h3>

            <div class="grid md:grid-cols-2 gap-4">

                <select id="userAttendance"
                    class="px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                </select>

                <select id="statusAttendance"
                    class="px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                    <option value="Hadir">Hadir</option>
                    <option value="Terlambat">Terlambat</option>
                    <option value="Izin">Izin</option>
                </select>

                <input type="text" id="reasonAttendance" placeholder="Alasan (jika izin)"
                    class="px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">

            </div>

            <button id="btnAddAttendance" 
                class="mt-4 w-full bg-green-600 text-white px-6 py-2 rounded-lg hover:bg-green-700 transition">
                Add Attendance
            </button>
        </div>
    </div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<!-- Auth -->
<script src="auth.js"></script>

<script type="module" src="app.js"></script>
<script type="module" src="admin.js"></script>

<script>
document.addEventListener("DOMContentLoaded", async () => {
    await requireAuth();
    listenAuth();
});
</script>
</body>
</html>
