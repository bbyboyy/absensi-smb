<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <!-- <link rel="stylesheet" href="style.css"> -->

    <!-- PWA -->
    <link rel="manifest" href="manifest.json">

    <!-- iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Absensi SMB">
    <meta name="theme-color" content="#0d6efd">

    <!-- Responsive -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

    <!-- Styling -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-blue-500 to-sky-600 min-h-screen flex items-center justify-center">

    <!-- CARD -->
    <div class="bg-white/20 backdrop-blur-lg p-8 rounded-2xl shadow-xl w-full max-w-sm border border-white/30">
        
        <!-- <h2 class="text-2xl font-bold text-center text-white mb-6">
            🔐 Login Absensi
        </h2> -->

        <div class="flex flex-col items-center mb-6">

            <!-- AVATAR ICON -->
            <!-- <div class="w-20 h-20 rounded-full bg-blue-100 
                        flex items-center justify-center shadow-sm mb-3
                        transition duration-300 hover:scale-105">

                
                <svg xmlns="http://www.w3.org/2000/svg"
                    class="w-10 h-10 text-blue-600"
                    fill="none" viewBox="0 0 24 24" stroke="currentColor">

                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M5.121 17.804A9 9 0 1118.879 17.804M15 11a3 3 0 11-6 0 3 3 0 016 0z" />
                </svg>

            </div> -->

            <div class="w-20 h-20 rounded-full bg-white p-1
                        flex items-center justify-center shadow-md mb-3 overflow-hidden">

                <img src="/icon/logo-smb-500.png" 
                    alt="Logo"
                    class="w-full h-full object-contain transition duration-300 hover:scale-110">
            </div>

            <!-- TITLE -->
            <h2 class="text-2xl font-bold text-center text-blue-50">
                Login Absensi
            </h2>

        </div>

        <div class="space-y-4">

            <!-- EMAIL -->
            <input type="email" id="email" placeholder="Email"
                class="w-full px-4 py-2 rounded-lg bg-white/30 text-white placeholder-gray-200
                       focus:ring-2 focus:ring-white outline-none">

            <!-- PASSWORD + TOGGLE -->
            <div class="relative">
                <input type="password" id="password" placeholder="Password"
                    class="w-full px-4 py-2 rounded-lg bg-white/30 text-white placeholder-gray-200
                           focus:ring-2 focus:ring-white outline-none">

                <!-- <button id="togglePassword" type="button"
                    class="absolute right-3 top-2 text-white">
                    👁️
                </button> -->

                <!-- ICON BUTTON -->
                <button type="button" id="togglePassword"
                    class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-500 hover:text-gray-700 transition">
                    
                    <!-- EYE ICON -->
                    <svg id="iconEye" xmlns="http://www.w3.org/2000/svg"
                        class="w-5 h-5 transition duration-200 hidden"
                        fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M2.458 12C3.732 7.943 7.523 5 12 5
                            c4.477 0 8.268 2.943 9.542 7
                            -1.274 4.057-5.065 7-9.542 7
                            -4.477 0-8.268-2.943-9.542-7z" />
                    </svg>

                    <!-- EYE OFF ICON -->
                    <svg id="iconEyeOff" xmlns="http://www.w3.org/2000/svg"
                        class="w-5 h-5 transition duration-200"
                        fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M13.875 18.825A10.05 10.05 0 0112 19
                            c-4.478 0-8.268-2.943-9.542-7
                            a9.956 9.956 0 012.042-3.368M6.223 6.223
                            A9.953 9.953 0 0112 5
                            c4.478 0 8.268 2.943 9.542 7
                            a9.956 9.956 0 01-4.293 5.058M15 12
                            a3 3 0 11-6 0 3 3 0 016 0zm6 6L3 3" />
                    </svg>

                </button>
            </div>

            <!-- ERROR -->
            <p id="errorMsg" class="text-red-200 text-sm hidden"></p>

            <!-- BUTTON -->
            <button id="btnLogin"
                class="w-full bg-white text-blue-600 py-2 rounded-lg font-semibold
                       hover:bg-gray-100 transition flex items-center justify-center gap-2 active:scale-95">

                <span id="btnText">Login</span>

                <svg id="loadingIcon" class="hidden animate-spin h-5 w-5"
                    viewBox="0 0 24 24">
                    <circle cx="12" cy="12" r="10"
                        stroke="currentColor"
                        stroke-width="4"
                        fill="none"/>
                </svg>
            </button>
        </div>
    </div>

    <!-- SUCCESS OVERLAY -->
    <div id="successOverlay"
        class="fixed inset-0 bg-black/50 backdrop-blur-md hidden items-center justify-center z-50">

        <div id="successCard"
            class="bg-white/10 border border-white/20 rounded-2xl p-8 text-center
                   transform transition-all duration-300 scale-90 opacity-0">

            <div class="w-16 h-16 mx-auto mb-4 rounded-full bg-green-500
                        flex items-center justify-center animate-bounce">
                <svg xmlns="http://www.w3.org/2000/svg"
                    class="w-8 h-8 text-white"
                    fill="none"
                    viewBox="0 0 24 24"
                    stroke="currentColor">
                    <path stroke-linecap="round"
                        stroke-linejoin="round"
                        stroke-width="3"
                        d="M5 13l4 4L19 7"/>
                </svg>
            </div>

            <h2 class="text-xl font-semibold text-white">Login Success</h2>
            <p class="text-sm text-gray-200 mt-1">
                Please wait...
            </p>
        </div>
    </div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="auth.js"></script>
<script type="module" src="app.js"></script>
<script>
    window.addEventListener("pageshow", async () => {
        await redirectIfLoggedIn();
    });

    // GLOBAL function biar bisa dipanggil dari app.js
    window.showSuccessAndRedirect = function () {
        const overlay = document.getElementById("successOverlay");
        const card = document.getElementById("successCard");

        overlay.classList.remove("hidden");
        overlay.classList.add("flex");

        setTimeout(() => {
            card.classList.remove("scale-90", "opacity-0");
            card.classList.add("scale-100", "opacity-100");
        }, 50);

        setTimeout(() => {
            window.location.href = "dashboard.html";
        }, 1500);
    }
</script>
</body>
</html>
