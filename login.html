<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <!-- <link rel="stylesheet" href="style.css"> -->

    <!-- PWA -->
    <link rel="manifest" href="manifest.json">

    <!-- iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Absensi QR">
    <meta name="theme-color" content="#0d6efd">

    <!-- Responsive -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Styling -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-blue-500 to-sky-600 min-h-screen flex items-center justify-center">

    <!-- CARD -->
    <div class="bg-white/20 backdrop-blur-lg p-8 rounded-2xl shadow-xl w-full max-w-sm border border-white/30">
        
        <h2 class="text-2xl font-bold text-center text-white mb-6">
            🔐 Login Absensi
        </h2>

        <div class="space-y-4">

            <!-- EMAIL -->
            <input type="email" id="email" placeholder="Email"
                class="w-full px-4 py-2 rounded-lg bg-white/30 text-white placeholder-gray-200
                       focus:ring-2 focus:ring-white outline-none">

            <!-- PASSWORD + TOGGLE -->
            <div class="relative">
                <input type="password" id="password" placeholder="Password"
                    class="w-full px-4 py-2 rounded-lg bg-white/30 text-white placeholder-gray-200
                           focus:ring-2 focus:ring-white outline-none">

                <button id="togglePassword" type="button"
                    class="absolute right-3 top-2 text-white">
                    👁️
                </button>
            </div>

            <!-- ERROR -->
            <p id="errorMsg" class="text-red-200 text-sm hidden"></p>

            <!-- BUTTON -->
            <button id="btnLogin"
                class="w-full bg-white text-blue-600 py-2 rounded-lg font-semibold
                       hover:bg-gray-100 transition flex items-center justify-center gap-2">

                <span id="btnText">Login</span>

                <svg id="loadingIcon" class="hidden animate-spin h-5 w-5"
                    viewBox="0 0 24 24">
                    <circle cx="12" cy="12" r="10"
                        stroke="currentColor"
                        stroke-width="4"
                        fill="none"/>
                </svg>
            </button>
        </div>
    </div>

    <!-- SUCCESS OVERLAY -->
    <div id="successOverlay"
        class="fixed inset-0 bg-black/50 backdrop-blur-md hidden items-center justify-center z-50">

        <div id="successCard"
            class="bg-white/10 border border-white/20 rounded-2xl p-8 text-center
                   transform transition-all duration-300 scale-90 opacity-0">

            <div class="w-16 h-16 mx-auto mb-4 rounded-full bg-green-500
                        flex items-center justify-center animate-bounce">
                <svg xmlns="http://www.w3.org/2000/svg"
                    class="w-8 h-8 text-white"
                    fill="none"
                    viewBox="0 0 24 24"
                    stroke="currentColor">
                    <path stroke-linecap="round"
                        stroke-linejoin="round"
                        stroke-width="3"
                        d="M5 13l4 4L19 7"/>
                </svg>
            </div>

            <h2 class="text-xl font-semibold text-white">Login Berhasil</h2>
            <p class="text-sm text-gray-200 mt-1">
                Mengalihkan ke dashboard...
            </p>
        </div>
    </div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="auth.js"></script>
<script type="module" src="app.js"></script>
<script>
    window.addEventListener("pageshow", async () => {
        await redirectIfLoggedIn();
    });

    // GLOBAL function biar bisa dipanggil dari app.js
    window.showSuccessAndRedirect = function () {
        const overlay = document.getElementById("successOverlay");
        const card = document.getElementById("successCard");

        overlay.classList.remove("hidden");
        overlay.classList.add("flex");

        setTimeout(() => {
            card.classList.remove("scale-90", "opacity-0");
            card.classList.add("scale-100", "opacity-100");
        }, 50);

        setTimeout(() => {
            window.location.href = "dashboard.html";
        }, 1500);
    }
</script>
</body>
</html>
